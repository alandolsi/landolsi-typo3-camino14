name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

# Verhindert parallele Läufe auf derselben Ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Job 1: composer.json / composer.lock validieren
  # ─────────────────────────────────────────────
  validate:
    name: Validate Composer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: PHP 8.5 einrichten
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          tools: composer:v2
          coverage: none

      - name: composer validate
        run: composer validate --strict --no-interaction

      - name: Secret-Regressionscheck
        run: |
          secret_prefix="$(printf '%s_%s' 'sec' '')"
          secret_word="secret"
          openpanel_pattern="openpanel[^[:space:]]*${secret_word}"
          if git --no-pager grep -nE "${secret_prefix}|client[Ss]ecret|${openpanel_pattern}" -- \
            ':!vendor' \
            ':!var' \
            ':!public/typo3temp' \
            ':!composer.lock' \
            ':!.github/workflows/ci.yml'; then
            echo "Potentielles Secret im Repository gefunden."
            exit 1
          fi

  # ─────────────────────────────────────────────
  # Job 2: Projekt bauen und grundlegend prüfen
  # ─────────────────────────────────────────────
  build:
    name: Build & Smoke Test
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: PHP 8.5 einrichten
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          tools: composer:v2
          coverage: none

      - name: Composer-Cache konfigurieren
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Composer-Cache wiederherstellen
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Composer install
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: TYPO3-Version ausgeben
        run: vendor/bin/typo3 -V

      - name: JavaScript-Syntax prüfen
        run: |
          find packages/site-package/Resources/Public -name '*.js' -print0 \
            | xargs -0 -r -n1 node --check

      - name: Projekt-Smoke-Checks
        run: |
          test -f packages/site-package/Resources/Public/cookie-consent/cookie-consent.js
          test -f packages/site-package/Resources/Public/openpanel/openpanel-tracking.js
          test -f packages/site-package/Resources/Public/content-blocks/content-blocks.css
          test -f public/robots.txt
          vendor/bin/typo3 content-blocks:lint

      - name: Prüfen ob Autoload korrekt generiert wurde
        run: |
          test -f vendor/autoload.php || (echo "autoload.php fehlt!" && exit 1)
          echo "✓ vendor/autoload.php vorhanden"
