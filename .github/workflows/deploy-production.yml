name: Deploy Production

on:
  # Deployment wird bei jedem versionierten Tag ausgelöst (z.B. v1.0.0, v0.3.0)
  push:
    tags:
      - 'v*'
  # Manueller Trigger über GitHub UI (z.B. für Hotfixes)
  workflow_dispatch:

# Nur ein Production-Deployment gleichzeitig — nie abbrechen, sondern warten
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to CloudPanel (camino14.landolsi.de)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: PHP 8.5 einrichten
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          tools: composer:v2
          coverage: none

      - name: Composer-Cache konfigurieren
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Composer-Cache wiederherstellen
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-prod-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-prod-

      # vendor/ wird auf CI gebaut und per rsync deployed — kein Composer auf Server nötig
      - name: Composer install (production, ohne dev-Pakete)
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader --no-progress

      # SSH-Key einrichten (dedizierter Deploy-Key, nicht der persönliche Key)
      - name: SSH-Key einrichten
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: known_hosts befüllen
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
        run: |
          PORT="${PROD_PORT:-22}"
          ssh-keyscan -p "${PORT}" -H "${PROD_HOST}" >> ~/.ssh/known_hosts 2>/dev/null
          echo "✓ known_hosts befüllt für ${PROD_HOST}:${PORT}"

      # Code + vendor/ per rsync übertragen, sensible/lokale Dateien ausgeschlossen
      - name: Code via rsync deployen
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
        run: |
          PORT="${PROD_PORT:-22}"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${PORT} -o StrictHostKeyChecking=no" \
            --exclude=".git/" \
            --exclude=".github/" \
            --exclude=".ddev/" \
            --exclude="var/" \
            --exclude="node_modules/" \
            --exclude="config/system/settings.php" \
            --exclude="config/system/additional.php" \
            ./ \
            "${PROD_USER}@${PROD_HOST}:${PROD_DEPLOY_PATH}/"
          echo "✓ rsync nach ${PROD_DEPLOY_PATH} abgeschlossen"

      # Server braucht nur noch TYPO3 Cache leeren — composer install entfällt (vendor/ ist dabei)
      - name: TYPO3 Cache auf Server flushen
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
          PROD_PHP_BIN: ${{ secrets.PROD_PHP_BIN }}
        run: |
          PORT="${PROD_PORT:-22}"
          PHP="${PROD_PHP_BIN:-php}"
          ssh -i ~/.ssh/deploy_key \
              -p "${PORT}" \
              -o StrictHostKeyChecking=no \
              "${PROD_USER}@${PROD_HOST}" \
              "cd '${PROD_DEPLOY_PATH}' \
               && ${PHP} vendor/bin/typo3 cache:flush \
               && echo '✓ TYPO3 Cache geleert' \
               && ${PHP} vendor/bin/typo3 -V"

      - name: Deployment-Info
        run: |
          echo "✓ Production-Deployment erfolgreich abgeschlossen"
          echo "  Tag:    ${{ github.ref_name }}"
          echo "  Commit: ${{ github.sha }}"
          echo "  Server: ${{ secrets.PROD_HOST }}"
          echo "  Zeit:   $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
