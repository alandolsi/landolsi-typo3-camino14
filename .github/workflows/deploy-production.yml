name: Deploy Production

on:
  # Deployment wird bei jedem versionierten Tag ausgelöst (z.B. v1.0.0, v0.3.0)
  push:
    tags:
      - 'v*'
  # Manueller Trigger über GitHub UI (z.B. für Hotfixes)
  workflow_dispatch:

# Nur ein Production-Deployment gleichzeitig — nie abbrechen, sondern warten
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to CloudPanel (camino14.landolsi.de)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: PHP 8.5 einrichten
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          tools: composer:v2
          coverage: none

      - name: Composer-Cache konfigurieren
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Composer-Cache wiederherstellen
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-prod-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-prod-

      # vendor/ wird auf CI gebaut und per rsync deployed — kein Composer auf Server nötig
      - name: Composer install (production, ohne dev-Pakete)
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader --no-progress

      # SSH-Key einrichten — base64-kodiert gespeichert, um Newline-Probleme zu vermeiden
      - name: SSH-Key einrichten
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.PROD_SSH_PRIVATE_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -l -f ~/.ssh/deploy_key

      - name: known_hosts befüllen
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
        run: |
          PORT="${PROD_PORT:-22}"
          ssh-keyscan -p "${PORT}" -H "${PROD_HOST}" >> ~/.ssh/known_hosts 2>/dev/null
          echo "✓ known_hosts befüllt für ${PROD_HOST}:${PORT}"

      # SSH-Verbindung vorab testen (verbose für Debugging)
      - name: SSH-Verbindung testen
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          PORT="${PROD_PORT:-22}"
          ssh -i ~/.ssh/deploy_key \
              -p "${PORT}" \
              -o StrictHostKeyChecking=no \
              -v \
              "${PROD_USER}@${PROD_HOST}" "echo '✓ SSH OK'" 2>&1 | grep -E "debug1|Authentications|Permission|publickey|offer|accept|success|ident"

      - name: Pre-Deployment-Backup erstellen
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
          PROD_PHP_BIN: ${{ secrets.PROD_PHP_BIN }}
        run: |
          PORT="${PROD_PORT:-22}"
          PHP="${PROD_PHP_BIN:-php}"
          ssh -i ~/.ssh/deploy_key \
              -p "${PORT}" \
              -o StrictHostKeyChecking=no \
              "${PROD_USER}@${PROD_HOST}" \
              "PROD_DEPLOY_PATH='${PROD_DEPLOY_PATH}' PHP_BIN='${PHP}' bash -s" <<'REMOTE'
          set -euo pipefail

          if [ ! -d "${PROD_DEPLOY_PATH}" ]; then
            echo "Deploy-Pfad existiert noch nicht; Backup wird übersprungen."
            exit 0
          fi

          cd "${PROD_DEPLOY_PATH}"
          backup_dir="$(dirname "${PROD_DEPLOY_PATH}")/backups"
          stamp="$(date -u '+%Y%m%dT%H%M%SZ')"
          mkdir -p "${backup_dir}"

          if [ -d public/fileadmin ]; then
            tar -czf "${backup_dir}/fileadmin-${stamp}.tar.gz" -C public fileadmin
            echo "✓ fileadmin-Backup erstellt"
          else
            echo "⚠ public/fileadmin fehlt; fileadmin-Backup übersprungen"
          fi

          if command -v mysqldump >/dev/null 2>&1 && [ -f config/system/settings.php ]; then
            DB_BACKUP_FILE="${backup_dir}/database-${stamp}.sql.gz" "${PHP_BIN}" -r '
              $settings = require "config/system/settings.php";
              $db = $settings["DB"]["Connections"]["Default"] ?? null;
              if (!$db) {
                  fwrite(STDERR, "DB-Konfiguration fehlt.\n");
                  exit(1);
              }
              $args = [
                  "mysqldump",
                  "--single-transaction",
                  "--quick",
                  "--skip-lock-tables",
                  "-h", (string)($db["host"] ?? "localhost"),
                  "-P", (string)($db["port"] ?? 3306),
                  "-u", (string)$db["user"],
                  "--password=" . (string)$db["password"],
                  (string)$db["dbname"],
              ];
              $command = implode(" ", array_map("escapeshellarg", $args)) . " | gzip > " . escapeshellarg(getenv("DB_BACKUP_FILE"));
              passthru($command, $exitCode);
              exit($exitCode);
            '
            echo "✓ Datenbank-Backup erstellt"
          else
            echo "⚠ mysqldump oder settings.php fehlt; Datenbank-Backup übersprungen"
          fi

          find "${backup_dir}" -type f \( -name 'fileadmin-*.tar.gz' -o -name 'database-*.sql.gz' \) -mtime +14 -delete
          REMOTE

      # Code + vendor/ per rsync übertragen, sensible/lokale Dateien ausgeschlossen
      - name: Code via rsync deployen
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
        run: |
          PORT="${PROD_PORT:-22}"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${PORT} -o StrictHostKeyChecking=no" \
            --exclude=".git/" \
            --exclude=".github/" \
            --exclude=".ddev/" \
            --exclude="var/" \
            --exclude="node_modules/" \
            --exclude="public/fileadmin/" \
            --exclude="config/system/settings.php" \
            --exclude="config/system/additional.php" \
            ./ \
            "${PROD_USER}@${PROD_HOST}:${PROD_DEPLOY_PATH}/"
          echo "✓ rsync nach ${PROD_DEPLOY_PATH} abgeschlossen"

      # Server braucht nur noch TYPO3 Cache leeren — composer install entfällt (vendor/ ist dabei)
      - name: TYPO3 Cache auf Server flushen & Post-Setup
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
          PROD_PHP_BIN: ${{ secrets.PROD_PHP_BIN }}
        run: |
          PORT="${PROD_PORT:-22}"
          PHP="${PROD_PHP_BIN:-php}"
          ssh -i ~/.ssh/deploy_key \
              -p "${PORT}" \
              -o StrictHostKeyChecking=no \
              "${PROD_USER}@${PROD_HOST}" \
              "PROD_DEPLOY_PATH='${PROD_DEPLOY_PATH}' PHP_BIN='${PHP}' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "${PROD_DEPLOY_PATH}"

          if "${PHP_BIN}" vendor/bin/typo3 extension:setup --extension=site_package; then
            echo "✓ site_package Schema geprüft"
          else
            echo "⚠ site_package Schema-Setup übersprungen"
          fi

          if "${PHP_BIN}" vendor/bin/typo3 cache:flush; then
            echo "✓ TYPO3 Cache geleert"
          else
            echo "⚠ Cache-Flush übersprungen (settings.php fehlt?)"
          fi

          "${PHP_BIN}" vendor/bin/typo3 -V || true
          "${PHP_BIN}" -r '
            $settingsFile = "config/system/settings.php";
            if (!is_file($settingsFile)) { exit(0); }
            $c = require $settingsFile;
            $db = new mysqli(
                $c["DB"]["Connections"]["Default"]["host"],
                $c["DB"]["Connections"]["Default"]["user"],
                $c["DB"]["Connections"]["Default"]["password"],
                $c["DB"]["Connections"]["Default"]["dbname"]
            );
            $db->query("UPDATE pages SET backend_layout=\"pagets__CaminoContentpage\",backend_layout_next_level=\"pagets__CaminoContentpage\" WHERE uid=1 AND (backend_layout=\"\" OR backend_layout IS NULL)");
            echo "✓ backend_layout geprüft (" . $db->affected_rows . " Zeile(n) aktualisiert)\n";
          ' && echo "✓ Post-Setup abgeschlossen"
          REMOTE

      - name: Production-Healthcheck
        run: |
          base_url="https://camino14.landolsi.de"
          paths=("/" "/projekte" "/leistungen" "/kontakt" "/en/projects" "/typo3/")

          for path in "${paths[@]}"; do
            body="$(mktemp)"
            status="$(curl --silent --show-error --location --max-time 25 --write-out '%{http_code}' --output "${body}" "${base_url}${path}")"
            if [ "${status}" != "200" ]; then
              echo "Healthcheck fehlgeschlagen: ${base_url}${path} liefert HTTP ${status}"
              cat "${body}"
              exit 1
            fi
            if grep -Eiq 'Oops, an error occurred|Request: [0-9a-f]{8,}' "${body}"; then
              echo "TYPO3-Fehlermarker gefunden: ${base_url}${path}"
              cat "${body}"
              exit 1
            fi
            rm -f "${body}"
            echo "✓ ${base_url}${path}"
          done

      - name: Deployment-Info
        run: |
          echo "✓ Production-Deployment erfolgreich abgeschlossen"
          echo "  Tag:    ${{ github.ref_name }}"
          echo "  Commit: ${{ github.sha }}"
          echo "  Server: ${{ secrets.PROD_HOST }}"
          echo "  Zeit:   $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
