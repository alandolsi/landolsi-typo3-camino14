# DDEV Provider: production
#
# Verwendung:
#   ddev pull production    — DB + fileadmin von Production lokal holen
#   ddev push production    — Lokal nach Production übertragen (⚠️ DDEV fragt nach Bestätigung)
#
# Voraussetzung:
#   cp .ddev/.env.pullpush.example .ddev/.env.pullpush
#   Datei mit echten Zugangsdaten befüllen (wird NIEMALS committed)

# ── Verbindung prüfen (wird vor pull/push ausgeführt) ────────────────────────
auth_command:
  service: host
  command: |
    set -eu
    ENV_FILE="${DDEV_APPROOT}/.ddev/.env.pullpush"
    if [ ! -f "${ENV_FILE}" ]; then
      echo "❌ ${ENV_FILE} nicht gefunden."
      echo "   Bitte anlegen: cp .ddev/.env.pullpush.example .ddev/.env.pullpush"
      exit 1
    fi
    # shellcheck source=/dev/null
    . "${ENV_FILE}"

    MISSING=""
    for VAR in PROD_HOST PROD_USER PROD_DB_NAME PROD_DB_USER PROD_DB_PASSWORD PROD_FILES_PATH; do
      eval "VAL=\${${VAR}:-}"
      if [ -z "${VAL}" ]; then MISSING="${MISSING} ${VAR}"; fi
    done
    if [ -n "${MISSING}" ]; then
      echo "❌ Fehlende Variablen in .env.pullpush:${MISSING}"; exit 1
    fi

    ssh -p "${PROD_PORT:-22}" \
        -o BatchMode=yes \
        -o ConnectTimeout=10 \
        -o StrictHostKeyChecking=no \
        "${PROD_USER}@${PROD_HOST}" \
        "echo '✓ SSH-Verbindung zu ${PROD_HOST} OK'" || exit 1

# ── DB von Production ziehen ─────────────────────────────────────────────────
db_pull_command:
  service: host
  command: |
    set -eu
    . "${DDEV_APPROOT}/.ddev/.env.pullpush"

    # ⚠️ Sicherheits-Snapshot: lokale DB VOR dem Pull sichern
    SNAP_NAME="pre-pull-$(date +%Y%m%d-%H%M%S)"
    echo "▶ Erstelle lokalen DB-Snapshot (${SNAP_NAME}) vor dem Pull..."
    ddev snapshot --name "${SNAP_NAME}" 2>&1 | grep -E 'snapshot|error|✓|❌' || true
    echo "✓ Snapshot erstellt — Wiederherstellung: ddev snapshot restore ${SNAP_NAME}"

    DOWNLOADS="${DDEV_APPROOT}/.ddev/.downloads"
    mkdir -p "${DOWNLOADS}"
    rm -f "${DOWNLOADS}/db.sql.gz"

    echo "▶ Erstelle DB-Dump auf Production (${PROD_HOST})..."
    ssh -p "${PROD_PORT:-22}" \
        -o BatchMode=yes \
        -o StrictHostKeyChecking=no \
        "${PROD_USER}@${PROD_HOST}" \
        "mysqldump \
          --host='${PROD_DB_HOST:-127.0.0.1}' \
          --user='${PROD_DB_USER}' \
          --password='${PROD_DB_PASSWORD}' \
          --single-transaction \
          '${PROD_DB_NAME}'" \
      | gzip > "${DOWNLOADS}/db.sql.gz"
    echo "✓ DB-Dump gespeichert: ${DOWNLOADS}/db.sql.gz"

# ── fileadmin von Production ziehen ──────────────────────────────────────────
files_pull_command:
  service: host
  command: |
    set -eu
    . "${DDEV_APPROOT}/.ddev/.env.pullpush"

    DOWNLOADS="${DDEV_APPROOT}/.ddev/.downloads"
    mkdir -p "${DOWNLOADS}"
    rm -f "${DOWNLOADS}/fileadmin.tar.gz"

    echo "▶ Lade fileadmin von Production als Archiv..."
    REMOTE_PARENT=$(dirname "${PROD_FILES_PATH}")
    REMOTE_DIR=$(basename "${PROD_FILES_PATH}")
    ssh -p "${PROD_PORT:-22}" \
        -o BatchMode=yes \
        -o StrictHostKeyChecking=no \
        "${PROD_USER}@${PROD_HOST}" \
        "tar -czf - -C '${REMOTE_PARENT}' '${REMOTE_DIR}'" \
      > "${DOWNLOADS}/fileadmin.tar.gz"
    echo "✓ Archiv bereit: ${DOWNLOADS}/fileadmin.tar.gz"

# ── DB nach Production übertragen ─────────────────────────────────────────────
db_push_command:
  service: host
  command: |
    set -eu
    . "${DDEV_APPROOT}/.ddev/.env.pullpush"

    if [ ! -t 0 ]; then
      echo "❌ Production-Push nur interaktiv erlaubt."
      echo "   Starte den Befehl direkt im Terminal und bestätige ihn dort bewusst."
      exit 1
    fi

    echo "⚠️  PRODUCTION-DATENBANK-PUSH"
    echo "   Ziel: ${PROD_USER}@${PROD_HOST}:${PROD_DB_NAME}"
    echo "   Aktion: Lokale DDEV-Datenbank überschreibt Production."
    printf "   Tippe exakt 'push-production-db' zum Fortfahren: "
    read -r DB_CONFIRM
    if [ "${DB_CONFIRM}" != "push-production-db" ]; then
      echo "❌ Abgebrochen."
      exit 1
    fi

    TS=$(date +%Y%m%d_%H%M%S)
    TMP_FILE="/tmp/ddev_prod_push_${TS}.sql.gz"

    echo "▶ Prüfe lokale sichtbare Content-Texte auf ASCII-Umlaut-Schreibweisen..."
    "${DDEV_APPROOT}/scripts/check-visible-german-umlauts.sh" --db

    echo "▶ Exportiere lokale DB..."
    ddev export-db --file="${TMP_FILE}" --gzip

    echo "▶ Übertrage Dump auf Production..."
    rsync -az \
      -e "ssh -p ${PROD_PORT:-22} -o BatchMode=yes -o StrictHostKeyChecking=no" \
      "${TMP_FILE}" \
      "${PROD_USER}@${PROD_HOST}:/tmp/ddev_prod_push_${TS}.sql.gz"

    echo "▶ Importiere DB auf Production..."
    ssh -p "${PROD_PORT:-22}" \
        -o BatchMode=yes \
        -o StrictHostKeyChecking=no \
        "${PROD_USER}@${PROD_HOST}" \
        "gunzip -c /tmp/ddev_prod_push_${TS}.sql.gz | \
         mysql --host='${PROD_DB_HOST:-127.0.0.1}' \
               --user='${PROD_DB_USER}' \
               --password='${PROD_DB_PASSWORD}' \
               '${PROD_DB_NAME}' && \
         rm -f /tmp/ddev_prod_push_${TS}.sql.gz"

    rm -f "${TMP_FILE}"
    echo "✓ DB-Push abgeschlossen"

# ── fileadmin nach Production übertragen ──────────────────────────────────────
files_push_command:
  service: host
  command: |
    set -eu
    . "${DDEV_APPROOT}/.ddev/.env.pullpush"

    if [ ! -t 0 ]; then
      echo "❌ Production-Push nur interaktiv erlaubt."
      echo "   Starte den Befehl direkt im Terminal und bestätige ihn dort bewusst."
      exit 1
    fi

    echo "⚠️  PRODUCTION-FILEADMIN-PUSH"
    echo "   Ziel: ${PROD_USER}@${PROD_HOST}:${PROD_FILES_PATH}"
    echo "   Aktion: Lokales fileadmin wird nach Production synchronisiert."
    printf "   Tippe exakt 'push-production-files' zum Fortfahren: "
    read -r FILES_CONFIRM
    if [ "${FILES_CONFIRM}" != "push-production-files" ]; then
      echo "❌ Abgebrochen."
      exit 1
    fi

    LOCAL_FILES="${DDEV_APPROOT}/${LOCAL_FILES_PATH:-public/fileadmin/}"

    echo "▶ Synchronisiere fileadmin: lokal → Production (ohne --delete)..."
    rsync -az \
      -e "ssh -p ${PROD_PORT:-22} -o BatchMode=yes -o StrictHostKeyChecking=no" \
      "${LOCAL_FILES}" \
      "${PROD_USER}@${PROD_HOST}:${PROD_FILES_PATH}"
    echo "✓ Files-Push abgeschlossen"
